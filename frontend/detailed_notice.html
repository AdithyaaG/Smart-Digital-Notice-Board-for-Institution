<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Details | SR-Notify</title>
    <link rel="stylesheet" href="css/role.css">
    <link rel="stylesheet" href="css/details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <header class="admin-header">
        <button class="btn-back" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="header-text">
            <h2 id="detailTitle">Notice Details</h2>
            <p id="detailType">General</p>
        </div>
        <button id="shareBtn" class="btn-share" style="display: none;">
            <i class="fas fa-share-alt"></i>
        </button>
    </header>

    <main class="details-container">
        <div class="details-card">
            <div id="mediaContainer" class="media-container"></div>
            
            <div class="details-content">
                <h1 id="noticeHeading"></h1>
                <p id="noticeFullText"></p>
                
                <div id="attachmentSection" class="attachment-box" style="display: none;">
                    <div class="file-info">
                        <i class="fas fa-file-download"></i>
                        <span id="fileName">document.pdf</span>
                    </div>
                    <a href="#" id="downloadLink" class="btn-download">Download</a>
                </div>

                <div class="details-meta">
                    <span><i class="far fa-calendar-alt"></i> <span id="postDate"></span></span>
                    <span><i class="far fa-eye"></i> <span id="viewCount"></span> Views</span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/details_script.js"></script>
</body>
</html>
