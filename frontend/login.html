<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SR-Notify</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4285f4;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #1a237e 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 350px;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #333;
            font-weight: 400;
        }

        p {
            margin: 5px 0;
            color: #777;
            font-size: 0.9rem;
        }

        .app-name {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .btn-login {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background-color: white;
            color: #555;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid #ddd;
        }

        .btn-login i {
            font-size: 1.2rem;
        }

        .btn-login:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background-color: #eee;
        }

        .fa-google {
            color: #4285F4;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Welcome</h1>
        <p>to</p>
        <span class="app-name">SR-Notify</span>
        
        <button id="googleLoginBtn" onclick="handleLoginClick()" class="btn-login">
            <i class="fab fa-google"></i> Login with College Email
        </button>
    </div>

    <script type="module" src="js/login_handler.js"></script>

    <script>
        function handleLoginClick() {
            const btn = document.getElementById('googleLoginBtn');
            btn.disabled = true;
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
            
            if (typeof window.loginWithGoogle === 'function') {
                window.loginWithGoogle().finally(() => {
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                    }, 3000);
                });
            } else {
                console.error("Login function not loaded yet.");
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                }, 1000);
            }
        }
    </script>

</body>
</html>
