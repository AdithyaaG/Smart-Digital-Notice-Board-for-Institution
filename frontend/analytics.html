<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | SR-Notify</title>
    <link rel="stylesheet" href="css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-container { padding: 20px; padding-bottom: 100px; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .stats-list-container { display: flex; gap: 15px; margin-top: 20px; }
        .list-box { flex: 1; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .list-box h4 { border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 10px; font-size: 0.9rem; }
        .student-name { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px solid #f9f9f9; color: #555; }
        .count-badge { font-weight: bold; color: #b3004b; }
    </style>
</head>
<body class="admin-body">

    <header class="admin-header">
        <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="header-text">
            <h2>Announcement Insights</h2>
            <p>Seen vs Unseen</p>
        </div>
    </header>

    <main class="analytics-container">
        <div class="dashboard-card" style="margin: 0 0 20px 0;">
            <h3 id="activeNoticeTitle">Semester Fee Reminder</h3>
            <p>Total Targeted Students: <span id="totalStudents">530</span></p>
        </div>

        <div class="chart-box">
            <canvas id="seenChart" style="max-height: 250px;"></canvas>
        </div>

        <div class="stats-list-container">
            <div class="list-box">
                <h4>Viewed (<span class="count-badge">412</span>)</h4>
                <div id="viewedList">
                    </div>
            </div>
            <div class="list-box">
                <h4>Not Viewed (<span class="count-badge">118</span>)</h4>
                <div id="notViewedList">
                    </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="admin_profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
        <a href="admin_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="admin_cn.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="/frontend/analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i></a>
        <a href="/frontend/notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>

    <script>
        // 1. Data Setup
        const seenData = {
            labels: ['Viewed', 'Not Viewed'],
            datasets: [{
                data: [412, 118],
                backgroundColor: ['#4caf50', '#f44336'],
                hoverOffset: 4
            }]
        };

        // 2. Initialize Chart
        const ctx = document.getElementById('seenChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: seenData,
            options: {
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // 3. Populate Names (Example Data)
        const viewedStudents = ["Rakesh G", "Priya K", "Suresh M", "Anita R", "Vikram S", "Mohan L"];
        const notViewedStudents = ["Ram G", "Dinesh B", "Sneha W", "Rahul P"];

        function populateList(elementId, studentArray) {
            const container = document.getElementById(elementId);
            studentArray.forEach(name => {
                const div = document.createElement('div');
                div.className = 'student-name';
                div.innerText = name;
                container.appendChild(div);
            });
        }

        populateList('viewedList', viewedStudents);
        populateList('notViewedList', notViewedStudents);
    </script>
</body>
</html>
