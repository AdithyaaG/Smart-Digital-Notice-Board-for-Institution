<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notices | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="../../assets/logo.png" alt="SR-Notify Logo" id="header-logo" style="height: 50px;">
        <div class="header-text">
            <h2 style="margin: 0; color: white;">SR-Notify</h2>
            <p style="margin: 0; color: rgba(255,255,255,0.8); font-size: 0.9rem;">Department Manage</p>
        </div>
    </div>
    

    <a href="department_profile.html" class="top-profile-link" style="text-decoration: none;">
        <div id="profile-container" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2);">
            <img id="user-header-img" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <i id="user-header-icon" class="fas fa-user-circle" style="font-size: 2rem; color: white;"></i>
        </div>
    </a>

    </header>

    
    <main class="admin-content" style="padding: 20px; padding-bottom: 100px;">
    <h2 class="section-title">Your Department Notices</h2>
    
    <div id="department-notice-container">
        <p style="text-align: center; color: #999; margin-top: 50px;">
            <i class="fas fa-spinner fa-spin"></i> Loading notices...
        </p>
    </div>
</main>

<div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease;">
    <div style="background:white; padding:30px; border-radius:20px; width:95%; max-width:450px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); position: relative; overflow: hidden;">
        
        <div style="background: #b3004b; margin: -30px -30px 25px -30px; padding: 20px; text-align: center;">
            <h3 style="color:white; margin:0; font-family: sans-serif; letter-spacing: 1px;"><i class="fas fa-edit"></i> EDIT NOTICE</h3>
        </div>

        <input type="hidden" id="edit-id">

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #b3004b; margin-bottom: 5px;">Notice Title</label>
            <input type="text" id="edit-title" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; outline:none; box-sizing: border-box; font-size: 1rem;" onfocus="this.style.borderColor='#b3004b'">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #b3004b; margin-bottom: 5px;">Content Description</label>
            <textarea id="edit-content" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; outline:none; height:100px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; resize: none;" onfocus="this.style.borderColor='#b3004b'"></textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #b3004b; margin-bottom: 5px;">Expiry Date & Time</label>
            <input type="datetime-local" id="edit-expiry" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; outline:none; box-sizing: border-box; font-size: 1rem; font-family: inherit;" onfocus="this.style.borderColor='#b3004b'">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #b3004b; margin-bottom: 5px;">Target Class/Code (Locked)</label>
            <input type="text" id="edit-target" disabled style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; outline:none; box-sizing: border-box; font-size: 1rem; background-color: #f9f9f9; color: #999; cursor: not-allowed;">
        </div>


        <div style="margin-top: 15px;">
    <label class="date-label">Current/New Attachment:</label>
    <div id="edit-image-preview" style="margin-bottom: 10px;"></div>
    <input type="file" id="edit-file-input" class="input-field" style="border: 2px dashed #ccc;">
    <div id="edit-upload-status" style="display:none; color: #b3004b; font-size: 0.8rem; font-weight: bold;">Uploading new file...</div>
</div>

        <div style="display:flex; gap:12px;">
            <button onclick="saveEdit()" style="flex:2; background:#b3004b; color:white; border:none; padding:14px; border-radius:12px; font-weight:bold; cursor:pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-check-circle"></i> Update Notice
            </button>
            <button onclick="document.getElementById('edit-modal').style.display='none'" style="flex:1; background:#f5f5f5; color:#666; border:none; padding:14px; border-radius:12px; font-weight:bold; cursor:pointer;">
                Cancel
            </button>
        </div>
    </div>
</div>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
<script type="module" src="../../js/department_manage.js"></script>
    <script type="module" src="../../js/profile_handler.js"></script>

     <nav class="bottom-nav">
        <a href="dept_manage_batches.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="department_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="department_cn.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="department_notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>

    <script>
        let currentNoticeId = null;

        function showDeleteConfirm(id) {
            currentNoticeId = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        function confirmDelete() {
            // In backend phase, this will call your API
            const notice = document.getElementById(`notice-${currentNoticeId}`);
            notice.style.opacity = '0';
            setTimeout(() => {
                notice.remove();
                closeModal();
                alert("Notice removed successfully.");
            }, 300);
        }
    </script>
</body>
</html>
