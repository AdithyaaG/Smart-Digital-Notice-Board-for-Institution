<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Notice | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Existing Styles ... */
        .btn-post {
            background-color: white;
            color: #b3004b;
            border: none;
            padding: 5px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* NEW: Multi-Preview Grid Styles */
        #attachment-preview-area {
            display: none;
            padding: 15px;
            background: #fdf2f7; /* Matching department pink theme */
            border-radius: 10px;
            margin: 10px 0;
            border: 1px solid #f8bbd0;
        }

        #preview-render-box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1/1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            background: #fff;
        }

        .preview-item img, .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #b3004b;
            color: white;
            border: none;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Rest of your existing CSS ... */
        .post-settings-wrapper { padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75rem; font-weight: bold; color: #b3004b; text-transform: uppercase; }
        .priority-select, .datetime-input, .title-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; outline: none; background-color: #f9f9f9; box-sizing: border-box; }
        .title-input { border-left: 5px solid #b3004b; font-weight: bold; background-color: white; }
        .post-container { padding: 20px; }
        .notice-textarea { width: 100%; height: 200px; border: none; resize: none; font-size: 1rem; outline: none; font-family: inherit; }
    </style>
</head>
<body class="admin-body">

    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="../../assets/logo.png" alt="SR-Notify Logo" style="height: 50px;">
            <div class="header-text">
                <h2 style="margin: 0; color: white;">SR-Notify</h2>
                <p style="margin: 0; color: rgba(255,255,255,0.8); font-size: 0.9rem;">Dept Dashboard</p>
            </div>
        </div>
        <button class="btn-post" onclick="publishDeptNotice()">POST</button> 
    </header>

    <div class="post-settings-wrapper">
        <div class="input-group">
            <label>Notice Title</label>
            <input type="text" id="noticeTitle" class="title-input" placeholder="e.g. Dept Symposium 2026">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>Priority</label>
                <select id="noticePriority" class="priority-select">
                    <option value="normal">General</option>
                    <option value="important">Important</option>
                    <option value="event">Campus Event</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label><i class="fas fa-calendar-day"></i> Event Date</label>
                <input type="date" id="eventDate" class="datetime-input">
            </div>
        </div>
    </div>

    <main class="post-container">
        <textarea class="notice-textarea" id="noticeContent" placeholder="Write details here..."></textarea>

        <div id="attachment-preview-area">
            <div class="preview-header">
                <span id="file-count" style="font-size: 0.7rem; font-weight: bold; color: #b3004b;">0 FILES SELECTED</span>
                <button type="button" class="remove-btn" onclick="removeAttachments()"><i class="fas fa-times"></i> Clear All</button>
            </div>
            <div id="preview-render-box"></div>
        </div>
        
        <div style="margin-top: 10px;">
            <label style="display:block; font-weight:bold; color:#b3004b; margin-bottom:5px;">Add Attachments</label>
            <input type="file" id="file-input" multiple accept="image/*,video/*,application/pdf" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px;">
        </div>
    </main>

    <script>
        // Preview Logic for Dept UI
        const fileInput = document.getElementById('file-input');
        const previewArea = document.getElementById('attachment-preview-area');
        const renderBox = document.getElementById('preview-render-box');
        const fileCountText = document.getElementById('file-count');

        fileInput.addEventListener('change', function() {
            const files = Array.from(this.files);
            if (files.length > 0) {
                previewArea.style.display = 'block';
                renderBox.innerHTML = ''; 
                fileCountText.innerText = `${files.length} FILES SELECTED`;

                files.forEach(file => {
                    const fileUrl = URL.createObjectURL(file);
                    const item = document.createElement('div');
                    item.className = 'preview-item';

                    if (file.type.startsWith('image/')) {
                        item.innerHTML = `<img src="${fileUrl}">`;
                    } else if (file.type.startsWith('video/')) {
                        item.innerHTML = `<video src="${fileUrl}"></video>`;
                    } else {
                        item.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#eee;"><i class="fas fa-file-pdf" style="color:#b3004b;"></i></div>`;
                    }
                    renderBox.appendChild(item);
                });
            }
        });

        window.removeAttachments = function() {
            fileInput.value = "";
            previewArea.style.display = "none";
            renderBox.innerHTML = "";
            fileCountText.innerText = "0 FILES SELECTED";
        }
    </script>

    <script type="module" src="../../js/dept_post.js"></script>
    <script type="module" src="../../js/profile_handler.js"></script>
</body>
</html>
