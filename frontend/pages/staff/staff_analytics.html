<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; --danger: #c62828; }
        .analytics-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 80px; }
        .list-box { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; height: 250px; overflow-y: auto; padding: 10px; }
        .name-tag { padding: 8px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; text-align: left; color: #444; display: flex; align-items: center; gap: 8px; }
        .count-num { font-size: 1.2rem; font-weight: bold; display: block; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .admin-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body class="admin-body">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="../../assets/logo.png" alt="Logo" style="height: 40px;">
                <div>
                    <h2 style="margin: 0; font-size: 1.2rem;">Notice Analytics</h2>
                    <p id="notice-title" style="margin: 0; opacity: 0.8; font-size: 0.8rem;">Loading notice details...</p>
                </div>
            </div>
            <a href="staff_home.html" style="color: white;"><i class="fas fa-times"></i></a>
        </div>
    </header>

    <main style="padding: 20px;">
        <div class="analytics-card">
            <p style="margin-top:0; color: #666;">Total Targeted: <strong id="totalCount">0</strong></p>
            <div style="height: 180px; position: relative; margin-bottom: 10px;">
                <canvas id="seenChart"></canvas>
            </div>
        </div>

        <div class="stats-grid">
            <div>
                <h4 style="color: var(--success); margin-bottom:10px;"><span id="vCount" class="count-num">0</span> Viewed</h4>
                <div id="viewedList" class="list-box"></div>
            </div>
            <div>
                <h4 style="color: var(--danger); margin-bottom:10px;"><span id="nvCount" class="count-num">0</span> Not Seen</h4>
                <div id="notViewedList" class="list-box"></div>
            </div>
        </div>
    </main>

   <script type="module">
    import { db } from '../../js/firebase-config.js';
    import { collection, query, where, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const noticeId = urlParams.get('id');
    let chartInstance = null;

    async function initAnalytics() {
        const staffName = localStorage.getItem("userName"); 
        if (!staffName || !noticeId) {
            console.error("Missing staffName or noticeId");
            return;
        }

        try {
            // 1. Fetch Notice Title to display in header
            const noticeDoc = await getDoc(doc(db, "notices", noticeId));
            if (noticeDoc.exists()) {
                document.getElementById('notice-title').innerText = noticeDoc.data().title;
            }

            // 2. Get Batch Range for THIS staff (Matches your working classroom logic)
            const batchQuery = query(collection(db, "batches"), where("controller_name", "==", staffName));
            const batchSnap = await getDocs(batchQuery);
            
            if (batchSnap.empty) {
                console.error("No batch found for this staff member");
                return;
            }

            const batchData = batchSnap.docs[0].data();
            const startRange = Number(batchData.start_reg);
            const endRange = Number(batchData.end_reg);

            // 3. Get All Students once and filter by your range
            const allStudentsSnap = await getDocs(collection(db, "students"));
            let targetedStudents = [];
            
            allStudentsSnap.forEach(d => {
                const s = d.data();
                const sId = Number(s.studentId || s.regNo); // Check both common field names
                if (sId >= startRange && sId <= endRange) {
                    targetedStudents.push({ id: sId, name: s.name });
                }
            });

            document.getElementById('totalCount').innerText = targetedStudents.length;

            // 4. Start Real-time Listener for Views
            // As students open the notice, they move from Not Seen to Viewed automatically
            onSnapshot(collection(db, "notices", noticeId, "views"), (vSnap) => {
                const viewedIds = new Set();
                vSnap.forEach(vd => {
                    // We assume the document ID in 'views' is the studentId string
                    viewedIds.add(Number(vd.id));
                });

                const seenList = targetedStudents.filter(s => viewedIds.has(s.id));
                const notSeenList = targetedStudents.filter(s => !viewedIds.has(s.id));

                updateUI(seenList, notSeenList);
            });

        } catch (error) {
            console.error("Analytics Logic Error:", error);
        }
    }

    function updateUI(seen, notSeen) {
        document.getElementById('vCount').innerText = seen.length;
        document.getElementById('nvCount').innerText = notSeen.length;
        
        renderLists(seen, 'viewedList', 'fa-check-circle', '#2e7d32');
        renderLists(notSeen, 'notViewedList', 'fa-times-circle', '#c62828');
        updateChart(seen.length, notSeen.length);
    }

    function renderLists(students, containerId, icon, color) {
        const container = document.getElementById(containerId);
        container.innerHTML = students.length > 0 ? students.map(s => `
            <div class="name-tag">
                <i class="fas ${icon}" style="color:${color}"></i> 
                <div>
                    <strong>${s.name}</strong><br>
                    <span style="font-size:0.7rem; color:#888;">ID: ${s.id}</span>
                </div>
            </div>
        `).join('') : '<p style="padding:10px; font-size:0.8rem; color:#999;">None</p>';
    }

    function updateChart(seen, unseen) {
        const ctx = document.getElementById('seenChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Viewed', 'Not Seen'],
                datasets: [{
                    data: [seen, unseen],
                    backgroundColor: ['#2e7d32', '#c62828'],
                    borderWidth: 0
                }]
            },
            options: { 
                cutout: '75%', 
                plugins: { legend: { display: false } }, 
                maintainAspectRatio: false 
            }
        });
    }

    initAnalytics();
</script>
    <script type="module" src="../../js/profile_handler.js"></script>

    <nav class="bottom-nav">
        <a href="staff_clsrom.html" class="nav-item"><i class="fas fa-chalkboard-teacher"></i></a>        
        <a href="staff_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="staff_cn.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="staff_notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>
</body>
</html>
