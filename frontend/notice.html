<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notices | SR-Notify</title>
    <link rel="stylesheet" href="css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <header class="admin-header">
        <img src="static/images/logo.png" alt="Logo">
        <div class="header-text">
            <h2>SR-Notify</h2>
            <p>Notice Control</p>
        </div>
    </header>

    <main class="admin-content">
        <h2 class="section-title">Notice Live</h2>
        
        <div class="dashboard-card notice-card" id="notice-1">
            <img src="static/images/admission_open.png" alt="Admission Open" class="notice-img">
            <button class="btn-remove-overlay" onclick="showDeleteConfirm(1)">Remove notice</button>
        </div>

        <h2 class="section-title">Scheduled Notice</h2>

        <div class="dashboard-card notice-card" id="notice-2">
            <h3>Semester Fee Due</h3>
            <p>Semester Fee Reminder: Please ensure your semester fees are cleared by 30th Jan...</p>
            <button class="btn-remove-overlay" onclick="showDeleteConfirm(2)">Remove notice</button>
        </div>

    </main>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-card">
            <img src="static/images/admission_open.png" alt="Preview" class="modal-preview-img" id="modalImg">
            <div class="modal-actions">
                <button class="btn-modal delete" onclick="confirmDelete()">Delete</button>
                <button class="btn-modal cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
        <a href="admin_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="create_notice.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i></a>
        <a href="notices.html" class="nav-item active"><i class="fas fa-clipboard-list"></i></a>
    </nav>

    <script>
        let currentNoticeId = null;

        function showDeleteConfirm(id) {
            currentNoticeId = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        function confirmDelete() {
            // In backend phase, this will call your API
            const notice = document.getElementById(`notice-${currentNoticeId}`);
            notice.style.opacity = '0';
            setTimeout(() => {
                notice.remove();
                closeModal();
                alert("Notice removed successfully.");
            }, 300);
        }
    </script>
</body>
</html>
