<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Notice | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-post {
            background-color: white;
            color: #b3004b;
            border: none;
            padding: 5px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* Priority Selector Styling */
        .priority-wrapper {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .priority-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="admin-body">

    <header class="admin-header">
        <img src="static/images/logo.png" alt="Logo">
        <div class="header-text">
            <h2>SR-Notify</h2>
            <p></p>
        </div>
        <button class="btn-post" onclick="submitNotice()">POST</button>
    </header>

    <div class="priority-wrapper">
        <select id="noticePriority" class="priority-select">
            <option value="normal">General Announcement</option>
            <option value="important">Important (Exams/Fees)</option>
            <option value="emergency">Emergency (Admin Only)</option>
            <option value="event">Campus Event (Shareable)</option>
        </select>
    </div>

    <main class="post-container">
        <textarea class="notice-textarea" id="noticeContent" placeholder="Post a new notice to keep the campus informed!...."></textarea>
        <div id="filePreview" style="margin-top: 10px; font-size: 0.85rem; color: #b3004b; font-weight: bold;"></div>
    </main>

    <input type="file" id="docInput" hidden accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt">
    <input type="file" id="videoInput" hidden accept="video/*">
    <input type="file" id="imageInput" hidden accept="image/*">

    <div class="fab-container">
        <div class="attachment-menu" id="attachmentMenu">
            <i class="fas fa-file-alt" title="Add Document" id="docIcon"></i>
            <i class="fas fa-video" title="Add Video" id="videoIcon"></i>
            <i class="fas fa-image" title="Add Image" id="imageIcon"></i>
        </div>
        <i class="fas fa-plus btn-add-main" id="mainAddBtn"></i>
    </div>

    <nav class="bottom-nav">
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
        <a href="admin_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="create_notice.html" class="nav-item active"><i class="fas fa-plus-square"></i></a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i></a>
        <a href="notices.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>

    <script src="js/post_script.js"></script>
</body>
</html>
